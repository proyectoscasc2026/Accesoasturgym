<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTUR GYM - Control de Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --astur-blue: #002b5e; 
            --astur-yellow: #fabb00; 
        }
        
        body { 
            background-color: var(--astur-blue); 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            transition: background-color 0.4s ease-in-out;
        }
        
        .bg-success { background-color: #16a34a !important; }
        .bg-error { background-color: #dc2626 !important; }
        
        .access-card { transition: all 0.3s ease-in-out; border-radius: 1.5rem; overflow: hidden; }
        .status-success-card { border-color: #22c55e; color: #16a34a; }
        .status-error-card { border-color: #ef4444; color: #dc2626; }
        
        #access-log::-webkit-scrollbar { width: 6px; }
        #access-log::-webkit-scrollbar-thumb { background: var(--astur-yellow); border-radius: 10px; }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div class="flex w-full max-w-7xl gap-6 h-[85vh]">
        <div id="view-client" class="flex-1 text-center flex flex-col justify-center relative">
            <img src="https://i.ibb.co/svknfxSq/541227282-18045312167644134-5085573338939708126-n.jpg" alt="Logo" class="w-40 mx-auto mb-4 drop-shadow-lg">
            <h1 class="text-5xl font-black mb-6 tracking-tighter italic uppercase" style="color: var(--astur-yellow); text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">ASTUR GYM</h1>
            
            <div class="bg-white/10 backdrop-blur-md p-8 rounded-3xl shadow-2xl border border-white/20">
                <p class="text-white/80 text-xl mb-4 font-bold uppercase tracking-widest">Ingrese DNI</p>
                <input type="text" id="main-input" autofocus 
                    class="w-full bg-white text-gray-900 text-6xl font-black text-center py-6 rounded-2xl border-4 border-transparent focus:border-yellow-400 focus:outline-none shadow-inner transition"
                    placeholder="00000000" onkeyup="handleInput(event)">
                
                <div id="display-result" class="hidden mt-6 p-6 bg-white border-8 access-card relative shadow-2xl shadow-black/50">
                    <div class="flex items-center gap-8">
                        <img id="res-foto" src="https://www.w3schools.com/howto/img_avatar.png" class="w-44 h-44 rounded-2xl object-cover shadow-lg">
                        <div class="text-left flex-1">
                            <h2 id="res-nombre" class="text-4xl font-black uppercase text-gray-800 leading-tight border-b-2 border-gray-100 pb-2 mb-2"></h2>
                            <p id="res-dni" class="text-xl font-bold text-gray-500 mb-4 uppercase tracking-tighter"></p>
                            <div id="res-status-badge" class="inline-block px-6 py-2 rounded-xl text-2xl font-black text-white shadow-md uppercase"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-8 flex justify-center items-center gap-8">
                <button onclick="abrirPuertaReal()" class="bg-white/10 hover:bg-white/20 border border-white/30 text-white px-6 py-3 rounded-full font-bold uppercase tracking-widest transition flex items-center gap-2 shadow-lg">
                    🔓 ABRIR PUERTA MANUAL
                </button>
                <button onclick="showAdminLogin()" class="text-white/40 hover:text-white transition font-bold text-sm tracking-widest uppercase">⚙️ Config</button>
            </div>
        </div>

        <div class="w-80 bg-black/40 backdrop-blur-md rounded-3xl border border-white/10 flex flex-col overflow-hidden shadow-2xl">
            <div class="bg-white/10 p-4 text-center border-b border-white/10">
                <h3 class="font-black uppercase tracking-wider text-sm" style="color: var(--astur-yellow);">Historial de Ingresos</h3>
                <p class="text-white/50 text-[10px] mt-1" id="log-status">Hoy: <span id="current-date-display"></span></p>
            </div>
            <div id="access-log" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
        </div>
    </div>

    <div id="modal-admin" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-black uppercase italic mb-6" style="color: var(--astur-blue);">Administración</h2>
            <div id="admin-auth">
                <input type="password" id="admin-pass" class="w-full border-4 border-gray-100 p-4 rounded-2xl mb-4 text-center text-2xl font-bold outline-none" placeholder="CLAVE">
                <button onclick="loginAdmin()" class="w-full text-white py-4 rounded-2xl font-black uppercase tracking-widest transition shadow-lg" style="background-color: var(--astur-blue);">INGRESAR</button>
                <button onclick="cerrarAdmin()" class="w-full mt-4 text-gray-400 text-xs font-bold uppercase">Cancelar</button>
            </div>
            <div id="admin-controls" class="hidden space-y-4">
                <button id="btn-sincronizar" class="w-full bg-green-600 text-white p-4 rounded-2xl font-bold hover:bg-green-700 shadow-lg flex items-center justify-center gap-2">🔄 Sincronizar Excel</button>
                <input type="file" id="foto-uploader" class="hidden" multiple onchange="procesarFotos(event)">
                <button onclick="document.getElementById('foto-uploader').click()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg">📸 Importar Fotos</button>
                
                <div class="mt-6 pt-6 border-t border-gray-200">
                    <div class="text-[10px] font-bold text-gray-400 uppercase mb-2 text-center">Generar QR Socio</div>
                    <div class="space-y-2">
                        <input type="text" id="qr-dni" class="w-full border-2 border-gray-100 p-2 rounded-xl text-center font-bold outline-none" placeholder="DNI Socio">
                        <input type="text" id="qr-tel" class="w-full border-2 border-gray-100 p-2 rounded-xl text-center font-bold outline-none" placeholder="WhatsApp (549...)">
                        <button onclick="enviarQRWhatsapp()" class="w-full bg-black text-white p-3 rounded-xl font-bold hover:bg-gray-800 transition">📲 Enviar QR</button>
                    </div>
                </div>

                <div class="bg-gray-100 p-3 rounded-xl text-xs mt-4">
                    <p><b>Placa Roja:</b> <span class="text-blue-600">192.168.0.50</span></p>
                </div>
                <button onclick="cerrarAdmin()" class="w-full bg-gray-200 p-4 rounded-2xl text-gray-700 font-bold uppercase">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTCyEdIV_bC82uoGFq1mIvJOXrvJI19KzwLVGjxyH8jYefbnHkNorxelpwTTqJ8KczrzoiiZ24dBWFj/pub?output=csv";
        const PLACA_IP = "192.168.0.50"; 
        
        let sociosDB = [];
        let fotosDB = {};
        const sonidoOk = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const sonidoError = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');

        window.onload = () => { 
            sincronizarSheets();
            document.getElementById('current-date-display').innerText = new Date().toLocaleDateString();
        };

        document.addEventListener('DOMContentLoaded', () => {
            const botonSincro = document.getElementById('btn-sincronizar');
            if (botonSincro) {
                botonSincro.addEventListener('click', (e) => sincronizarSheets(e));
            }
        });

        function handleInput(e) {
            if (e.key === "Enter") {
                const val = e.target.value.trim();
                if(val) { validarSocio(val); e.target.value = ""; }
            }
        }

        async function sincronizarSheets() {
            const btn = document.getElementById('btn-sincronizar');
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Sincronizando...";
            btn.disabled = true;

            try {
                const res = await fetch(SHEET_URL + "&t=" + Date.now());
                const csv = await res.text();
                const filas = csv.split(/\r?\n/).slice(1);
                
                sociosDB = filas.map(f => {
                    const c = f.split(",");
                    return { 
                        nombre: c[0]?.trim(), 
                        dni: c[1]?.trim(), 
                        numeroSocio: c[2]?.trim(), 
                        estado: c[3]?.trim().toUpperCase(),
                        importe: c[4]?.trim() 
                    };
                }).filter(s => s.dni);
                
                btn.innerHTML = "✅ ¡Listo!";
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 2000);
            } catch (err) { btn.disabled = false; }
        }

        async function validarSocio(id) {
            const registrosSocio = sociosDB.filter(s => s.dni == id || s.numeroSocio == id);
            
            if (registrosSocio.length === 0) { 
                document.body.className = "flex items-center justify-center p-6 bg-error";
                sonidoError.play();
                setTimeout(() => document.body.className = "flex items-center justify-center p-6", 2000);
                return; 
            }

            const totalPagado = registrosSocio.reduce((acc, curr) => acc + (parseFloat(curr.importe) || 0), 0);
            const ahora = new Date();
            const horaActual = ahora.getHours() + (ahora.getMinutes() / 60);
            const limiteHora = 17.5; 

            let acceso = false;
            let statusText = "";

            if (totalPagado >= 17600) {
                acceso = true;
                statusText = "ACCESO TOTAL";
            } else if (totalPagado > 0 && horaActual <= limiteHora) {
                acceso = true;
                statusText = "ACCESO REDUCIDO";
            } else {
                acceso = false;
                // CAMBIO SOLICITADO: "ACCESO DENEGADO"
                statusText = (totalPagado > 0) ? "HORARIO VENCIDO" : "ACCESO DENEGADO";
            }

            if (acceso) {
                mostrarUI(registrosSocio[0], statusText, true);
                abrirPuertaReal();
            } else {
                mostrarUI(registrosSocio[0], statusText, false);
                sonidoError.play();
            }
        }

        async function abrirPuertaReal() {
            const URL_COMANDO = `http://${PLACA_IP}/rele1?pulse=2`; 
            try {
                await fetch(URL_COMANDO, { method: 'GET', mode: 'no-cors' });
                sonidoOk.play();
            } catch (e) { console.error("Error placa Ethernet"); }
        }

        function mostrarUI(socio, status, exito) {
            const display = document.getElementById('display-result');
            const badge = document.getElementById('res-status-badge');
            
            document.getElementById('res-nombre').textContent = socio.nombre;
            document.getElementById('res-dni').textContent = `DNI: ${socio.dni}`;
            document.getElementById('res-foto').src = fotosDB[socio.dni] || "https://www.w3schools.com/howto/img_avatar.png";
            
            badge.textContent = status;
            badge.className = `inline-block px-6 py-2 rounded-xl text-2xl font-black text-white ${exito ? 'bg-green-600' : 'bg-red-600'}`;
            display.className = `mt-6 p-6 bg-white border-8 access-card relative shadow-2xl ${exito ? 'status-success-card' : 'status-error-card'}`;
            display.classList.remove('hidden');
            document.body.className = `flex items-center justify-center p-6 ${exito ? 'bg-success' : 'bg-error'}`;
            
            agregarAlLog(socio, exito, status);
            setTimeout(() => {
                display.classList.add('hidden');
                document.body.className = "flex items-center justify-center p-6";
                document.getElementById('main-input').focus();
            }, 4000);
        }

        function agregarAlLog(socio, exito, status) {
            const log = document.getElementById('access-log');
            const ahora = new Date();
            const horaStr = ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            // Agregamos la fecha corta: DD/MM
            const fechaStr = ahora.toLocaleDateString([], { day: '2-digit', month: '2-digit' });
            
            const entry = document.createElement('div');
            entry.className = `p-3 rounded-2xl border-l-4 bg-white/5 ${exito ? 'border-green-500' : 'border-red-500'} animate-fade-in text-white`;
            entry.innerHTML = `
                <div class="flex justify-between items-start">
                    <div class="text-xs font-bold uppercase">${socio.nombre}</div>
                    <div class="text-[8px] text-white/40 font-mono text-right">${fechaStr}<br>${horaStr}</div>
                </div>
                <div class="text-[9px] ${exito ? 'text-green-400' : 'text-red-400'} font-bold">${status}</div>
            `;
            log.prepend(entry);
            if (log.children.length > 20) log.removeChild(log.lastChild);
        }

        function enviarQRWhatsapp() {
            const dni = document.getElementById('qr-dni').value.trim();
            let tel = document.getElementById('qr-tel').value.trim();
            if (!dni || !tel) { alert("DNI y Teléfono obligatorios"); return; }
            tel = tel.replace(/\D/g, '');
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${dni}`;
            const mensaje = encodeURIComponent(`¡Hola! 👋 Código QR de acceso ASTUR GYM. \n\nPresentalo al ingresar: \n${qrUrl}`);
            window.open(`https://wa.me/${tel}?text=${mensaje}`, '_blank');
        }

        function showAdminLogin() { document.getElementById('modal-admin').classList.remove('hidden'); }
        function cerrarAdmin() { document.getElementById('modal-admin').classList.add('hidden'); }
        function loginAdmin() { if(document.getElementById('admin-pass').value === "gym1081") { document.getElementById('admin-auth').classList.add('hidden'); document.getElementById('admin-controls').classList.remove('hidden'); } }
        
        function procesarFotos(e) {
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                const dni = file.name.split('.')[0];
                reader.onload = (ev) => fotosDB[dni] = ev.target.result;
                reader.readAsDataURL(file);
            });
            alert("Fotos vinculadas");
        }
    </script>
</body>
</html>
